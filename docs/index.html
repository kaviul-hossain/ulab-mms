<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ULAB Marks Management System</title>
    <meta
      name="description"
      content="Docsify-powered GitHub Pages documentation for the ULAB Marks Management System."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/vue.css" />
    <style>
      :root {
        --theme-color: #1769ff;
        --docsifytabs-border-color: #d9e2f2;
        --page-bg: #eef2f7;
        --panel-bg: #ffffff;
        --panel-border: rgba(15, 23, 42, 0.08);
        --cover-bg: #0f1c2f;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--page-bg);
      }

      .sidebar,
      .content,
      .markdown-section {
        background: var(--page-bg);
      }

      .sidebar {
        border-right: 1px solid var(--panel-border);
      }

      .markdown-section {
        max-width: 1100px;
      }

      .cover {
        color: white;
        background: var(--cover-bg);
      }

      .cover h1,
      .cover h2,
      .cover p {
        text-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      }

      .cover .cover-main > p:last-child a {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      .app-shot {
        display: block;
        width: 100%;
        border-radius: 18px;
        border: 1px solid var(--panel-border);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        margin: 18px 0 28px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      @media (max-width: 900px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }

      .callout {
        padding: 16px 18px;
        border-radius: 16px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      }
    </style>
  </head>
  <body>
    <div id="app">Loading documentation...</div>
    <script>
      window.$docsify = {
        name: 'ULAB Marks Management System',
        homepage: 'README.md',
        loadSidebar: true,
        loadNavbar: true,
        coverpage: false,
        onlyCover: false,
        subMaxLevel: 3,
        auto2top: true,
        search: 'auto',
        noEmoji: false,
        themeColor: '#1769ff',
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  </body>
</html>
